# Conda fallback (use when uv is unavailable; preferred path is `uv pip install -e .[dev]`).
# For RTX 5090 (Blackwell, sm_120) on a Linux server: replace pytorch-cuda=12.6 with the
# nightly cu128 wheel after the conda env is created — see README.
name: hemefm
channels:
  - pytorch
  - nvidia
  - bioconda
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - pytorch>=2.6
  - pytorch-cuda=12.6
  - cuda-runtime>=12.6
  - numpy>=2.0
  - pandas>=2.2
  - pyarrow>=17
  - scikit-learn>=1.5
  - scipy>=1.14
  - matplotlib>=3.9
  - seaborn>=0.13
  - statsmodels>=0.14
  - rich>=13.7
  - tqdm>=4.66
  - jupyterlab
  - pip:
    - lightning>=2.5
    - hydra-core>=1.3.2
    - omegaconf>=2.3
    - wandb>=0.18
    - anndata>=0.10
    - scanpy>=1.10
    - captum>=0.7
    - shap>=0.46
    - lifelines>=0.29
    - pycox>=0.3
    - typer>=0.12
    - python-dotenv>=1.0
    - pytest>=8.0
    - pytest-cov>=5.0
    - ruff>=0.6
    - mypy>=1.10
    - pre-commit>=3.7
    - -e .
