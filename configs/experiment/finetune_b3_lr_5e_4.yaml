# @package _global_
# B3 lr-sweep arm: encoder_lr=5e-4 (fairness-to-random-init follow-up; Appendix A.4 commitment)
defaults:
  - override /model: hemefm_multimodal_base
  - override /data: beataml_multimodal
  - override /trainer: default
  - override /logger: csv

seed: 42
mode: finetune
weighting: kendall

lr: 1e-4
encoder_lr: 5e-4
weight_decay: 0.05
warmup_steps: 50
unfreeze_after_step: 200

pretrained_ckpt: null

data:
  batch_size: 4
  num_workers: 4
  val_fraction: 0.20

trainer:
  devices: 2
  strategy: ddp_find_unused_parameters_true
  max_epochs: 50
  log_every_n_steps: 10
  precision: bf16-mixed
  gradient_clip_val: 1.0
  accumulate_grad_batches: 1

logger:
  name: finetune_b3_lr_5e_4-2gpu
