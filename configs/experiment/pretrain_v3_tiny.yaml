# @package _global_
# Phase 3' SMOKE — verify pipeline e2e on 2,661 corpus with tiny model that fits in shared GPU
defaults:
  - override /model: hemefm_tiny
  - override /data: pretrain
  - override /trainer: default
  - override /logger: csv

seed: 42
mode: pretrain

model:
  vocab_size: 4150
  max_seq_len: 4200
  n_bins: 16
  d_model: 64
  n_heads: 4
  n_layers: 4
  d_ff: 256
  dropout: 0.1

data:
  batch_size: 4
  num_workers: 2
  val_fraction: 0.05
  mask_prob: 0.15
  max_seq_len: 4200
  n_bins: 16

trainer:
  max_epochs: 30
  log_every_n_steps: 10
  precision: bf16-mixed
  gradient_clip_val: 1.0

logger:
  name: pretrain-v3-tiny-2661samples
