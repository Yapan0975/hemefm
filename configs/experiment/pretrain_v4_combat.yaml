# @package _global_
# Phase 3''' — Pretraining with per-cohort batch-corrected corpus (Stage 2'' arm A)
# Corpus v4: per-cohort z-score on log1p before rank-binning (mitigates platform shift)
defaults:
  - override /model: hemefm_base
  - override /data: pretrain
  - override /trainer: default
  - override /logger: csv

seed: 42
mode: pretrain

model:
  vocab_size: 4150
  max_seq_len: 4200
  n_bins: 16
  d_model: 768
  n_heads: 12
  n_layers: 24
  d_ff: 3072
  dropout: 0.1
  attention_dropout: 0.1

data:
  corpus_parquet: ${hydra:runtime.cwd}/data/processed/pretrain_corpus_v4_combat.parquet
  tokenizer_json: ${hydra:runtime.cwd}/data/processed/tokenizer_v4_combat.json
  batch_size: 8
  num_workers: 4
  val_fraction: 0.05
  mask_prob: 0.15
  max_seq_len: 4200
  n_bins: 16

trainer:
  devices: 2                # GPU 1, 2 (avoid GPU 0 user3, GPU 3 zombie)
  strategy: ddp
  max_epochs: 30
  log_every_n_steps: 10
  precision: bf16-mixed
  gradient_clip_val: 1.0
  accumulate_grad_batches: 2  # effective batch = 8*2*2 = 32 (match v3)

logger:
  name: pretrain-v4-combat-2gpu
