# @package _global_
# Stage 3 — Domain-adversarial finetune (DANN) on v3 backbone with BeatAML source + GSE6891 target
defaults:
  - override /model: hemefm_multimodal_base
  - override /data: beataml_adversarial
  - override /trainer: default
  - override /logger: csv

seed: 42
mode: finetune_adversarial          # NEW mode triggers FinetuneAdversarialLightningModule
weighting: kendall

lr: 1e-4
encoder_lr: 1e-5
weight_decay: 0.05
warmup_steps: 50
unfreeze_after_step: 200

adv_lambda: 0.1                     # auxiliary loss weight per §3.7 v4 (c)
adv_hidden: 256

pretrained_ckpt: ${hydra:runtime.cwd}/logs/pretrain-v3-base-ddp-2661samples/version_0/checkpoints/epoch=29-step=2280.ckpt

data:
  batch_size: 4

trainer:
  devices: 2
  strategy: ddp_find_unused_parameters_true
  max_epochs: 50
  log_every_n_steps: 10
  precision: bf16-mixed
  gradient_clip_val: 1.0

logger:
  name: finetune-v5-dann-2gpu
