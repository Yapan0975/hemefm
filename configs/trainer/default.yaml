# PyTorch Lightning Trainer — single 5090, bf16, conservative defaults.
# Production runs will override: max_epochs, accumulate_grad_batches, precision, strategy.
_target_: lightning.pytorch.Trainer

accelerator: gpu
devices: 1
precision: bf16-mixed             # 5090 supports native bf16
max_epochs: 1
log_every_n_steps: 10
val_check_interval: 1.0
gradient_clip_val: 1.0
gradient_clip_algorithm: norm
accumulate_grad_batches: 1
deterministic: false              # bf16 + flash-attn => deterministic=false acceptable
enable_progress_bar: true
enable_checkpointing: true
enable_model_summary: true
