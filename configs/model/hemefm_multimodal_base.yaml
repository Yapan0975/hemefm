# Production multimodal HemeFM — base 173M RNA encoder + cross-attention fusion + 4 task heads
# Matches the pretrained pretrain_v3_ddp.yaml backbone (vocab 4150, max_seq_len 4200, 24L/768d/12h).
defaults:
  - hemefm_base@rna_encoder

_target_: hemefm.models.multimodal.MultiModalHemeFM

rna_encoder:
  vocab_size: 4150
  max_seq_len: 4200
  d_model: 768
  n_heads: 12
  n_layers: 24
  d_ff: 3072
  dropout: 0.1
  attention_dropout: 0.1

cfg:
  _target_: hemefm.models.multimodal.MultiModalConfig
  n_subtypes: 6                  # 3 ELN × 2 age = 6 proxy subtypes
  n_eln_classes: 3               # Favorable / Intermediate / Adverse
  n_drugs: 50
  n_mutation_genes: 200
  n_variant_classes: 6
  n_methylation_features: 5000
  fusion_layers: 2
  fusion_heads: 12
  dropout: 0.1
  freeze_rna_encoder: false      # unfreeze layer-wise after warmup
