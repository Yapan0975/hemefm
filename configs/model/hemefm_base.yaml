# Production HemeFM-base — 24-layer / 768-dim / 12-head ≈ 75 M parameters.
# Used in pretraining and as the RNA backbone in multimodal fine-tuning.
_target_: hemefm.models.transformer.HemeFMEncoder

vocab_size: 17000
n_bins: 16
max_seq_len: 4096
d_model: 768
n_heads: 12
n_layers: 24
d_ff: 3072
dropout: 0.1
attention_dropout: 0.1
mask_token_id: 1
pad_token_id: 0
cls_token_id: 2
